name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - name: Run tests
        run: nix-shell --run "python -m pytest tests/ -v"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      # Only `ruff check` is gated. `ruff format --check` is skipped
      # because the ruff version floats between local Nix shells and CI
      # runners — formatting rules drift across minor versions and the
      # check would break unrelated PRs. Run `ruff format` locally as
      # part of your workflow if you care about style consistency.
      - name: Ruff check
        run: nix-shell --run "ruff check backend/ tests/"

  build:
    name: Nix Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - name: Build package
        run: nix-build default.nix
